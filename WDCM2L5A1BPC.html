<!--
1) Start the HTML document with `<!DOCTYPE ...>`:
   a) This line tells the browser what type of HTML document it is.
   b) Note: In proper HTML5, it should be `<!DOCTYPE html>`.

2) Open the `<html lang="en">` tag:
   a) Wraps the whole webpage.
   b) `lang="en"` tells the browser the page language is English.

3) Inside the `<head>` section:
   a) Add `<meta charset="UTF-8">` to support special characters.
   b) Set the page title using `<title>CSS Box Model Example</title>`.
   c) Add internal CSS inside the `<style>` tag.

4) Create a CSS class `.example1` (Box Model Example 1):
   a) `width: 220px;` sets the content width.
   b) `background-color: yellow;` sets the background color.
   c) `padding: 0px;` adds no space between content and border.
   d) `border: 0px;` adds no border.
   e) `margin: 0px;` adds no outside space.
   (So this box is only the content area with a yellow background.)

5) Create a CSS class `.example2` (Box Model Example 2):
   a) `width: 220px;` sets the content width.
   b) `background-color: green;` sets the background color.
   c) `padding: 50px;` adds space inside the box around the content.
   d) `border: 5px solid black;` adds a thick black border.
   e) `margin: 40px 20px;` adds space outside the box:
      - 40px top & bottom
      - 20px left & right

6) Style all `<hr>` tags:
   a) `background-color: red;` gives a red background to horizontal rules
      (but some browsers may rely more on border styling for `<hr>`).

7) Inside the `<body>` section:
   a) Add a heading `<h1>`: "Box Model Example".

8) Add the first `<hr>` line (uses the CSS `hr { background-color: red; }` rule).

9) Add a paragraph `<p>` with class `example1`:
   a) This applies the yellow background and no padding/border/margin.

10) Add another `<hr>` with inline styles:
    a) `width: 10%` makes the line shorter.
    b) `height: 10px` makes the line thicker.
    c) `color: blue` attempts to color it blue (may vary by browser).

11) Add a paragraph `<p>` with class `example2`:
    a) This applies padding, border, and margin to demonstrate the full box model.

12) Add the last `<hr>` with inline styles:
    a) `width: 20%` makes the line short.
    b) `height: 1px` makes it thin.
    c) `color: blue` attempts to color it blue.

13) Close the `<body>` tag and then close the `<html>` tag.
-->
<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <title>CSS Box Model Example</title>
   <style>
      .example1 {
         width: 220px;
         background-color: palevioletred;
         padding: 3px;
         border: 2px salmon solid;
         margin: 3px 40px top bottom 20px left right;
      }

      .example2 {
         width: 360px;
         background-color: aliceblue;
         padding: 50px;
         border: 5px lavender solid;
         margin: 40px 20px;
      }

      #xo-right {
         float: right;
      }

      #xo-left {
         float: left;
      }

      hr {
         background-color: mediumpurple;
      }
   </style>

<body>
   <h1>Box Model Example</h1>
   <hr>
   <p class="example1">This is my first example.</p>
   <hr style="width: 10%; height: 10px; color:hotpink;">
   <p class="example2">This is my second example.</p>
   <hr style="width: 20%; height: 1px; color:indianred;">
   <img id="xo-right" src="xo_enhypen.jpg" alt="Flower Image" width="240" height="240">
   <video width="400" height="300" controls autoplay poster="xo_enhypen.jpg" loop>
      <source src="xoenhypen.mp4" type="video/mp4">
   </video>
</body>
</head>

</html>
